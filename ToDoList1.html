<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoリスト</title>
</head>
<body>

  <h1>ToDoリスト</h1>

  <input type="text" id="taskInput" placeholder="やること入力">
  <button onclick="addTask()">追加</button>

  <ul id="taskList"></ul>

  <script>
    function addTask() {
      const input = document.getElementById("taskInput");
      const task = input.value;

      if (task === "") return;

      const li = document.createElement("li");
      li.textContent = task;

      li.onclick = function() {
        li.remove();
      };

      document.getElementById("taskList").appendChild(li);
      input.value = "";
    }
  </script>

</body>
</html>
